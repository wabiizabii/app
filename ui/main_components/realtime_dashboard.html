<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Obsidian - Live Cockpit (Full Feature)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="portfolio_command_center.css">
</head>
<body>
    <div class="cockpit-wrapper">        
        <!-- ====================================================== -->
        <!-- PART 1: IGNITION MODULE                              -->
        <!-- ====================================================== -->
        <div class="ignition-module" id="ignition-module">
            <!-- Balance Confirmation Module -->
            <div id="ignition-content-balance" style="display: none; flex-direction: column; align-items: center;">
                <h2 class="header">PRE-FLIGHT CHECK</h2>
                <input type="number" id="openingBalanceInput" placeholder="Enter Opening Balance" step="0.01">
                <button id="startTradingBtn">START TRADING DAY</button>
            </div>

            <!-- Timezone Confirmation Module (Corrected Version) -->
            <div id="ignition-content-timezone" style="display: none; flex-direction: column; align-items: center;">
                <h2 class="header">NEW BROKER DETECTED</h2>
                <p id="broker-confirmation-text" style="margin-bottom: 16px; color: var(--color-text-secondary);">
                    Please confirm the timezone for...
                </p>
                <select id="timezone-offset-select" class="planner-input" style="width: 200px; text-align: center; margin-bottom: 24px;">
                    <!-- JS will generate options here -->
                </select>   
                <button id="confirmTimezoneBtn">CONFIRM & PROCEED</button>
            </div>
        </div>

        <!-- ====================================================== -->
        <!-- PART 2: MAIN COCKPIT                                 -->
        <!-- ====================================================== -->
        <main class="cockpit-container" id="cockpit-container">
            <div class="main-view" id="main-view">
                
                <!-- [ RE-ARCHITECTED ] Unified Left Column -->
                <div id="left-col">
                    <div class="card" id="left-panel-card">
                        <!-- Consistency Gauge (Top Position) -->
                        <div id="consistency-gauge-wrapper">
                            <h4 class="gauge-header">
                                <span>PROFIT CONSISTENCY</span>
                                <span class="info-icon" title="Measures how much of your total profit comes from your single biggest winning trade. A lower % is better for Prop Firm consistency rules.">ⓘ</span>
                            </h4>
                            <div class="consistency-bar-wrapper">
                                <div id="consistency-tooltip" class="consistency-tooltip">0%</div>
                                <div id="consistency-bar-background" class="consistency-bar"></div>
                            </div>
                            <div class="consistency-labels-wrapper">
                                <span>0%</span>
                                <span id="consistency-safe-zone-label" class="gauge-label-middle">30%</span>
                                <span>100%</span>
                            </div>
                        </div>
                        <!-- HUD (Middle Position) -->
                        <div id="hud-bar"></div>
                        <!-- Chart Area (Bottom, Flexible Position) -->
                        <div id="chart-area"><div id="tradingview-widget-container"></div></div>
                    </div>
                </div>

                <div class="v-splitter" id="splitter1"></div>
                <div id="battle-planner-col"></div>
                <div class="v-splitter" id="splitter2"></div>
                <div id="analysis-col"></div>
            </div>

            <div class="h-splitter" id="h-splitter"></div>
            <div id="bottom-bar"></div>
        </main>

        <!-- ====================================================== -->
        <!-- PART 3: FLYOUT TABS [ Corrected Position ]           -->
        <!-- ====================================================== -->
        

    </div>
    
        <div id="bp-flyout-tab" class="flyout-tab">Planner</div>
        <div id="an-flyout-tab" class="flyout-tab">Analysis</div>
        <div id="sb-flyout-tab" class="flyout-tab-bottom">Situational Awareness</div>

    <!-- ====================================================== -->
    <!-- SCRIPTS and TEMPLATES                                -->
    <!-- ====================================================== -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <script src="main.js"></script>
    <script src="portfolio_command_center.js"></script>
    <script src="athena_prime_module.js"></script>

    <!-- UI Templates -->
    <template id="hud-bar-template">
        <div class="card hud-card" id="live-equity-card">
            <h4 class="card-header">
                <span>LIVE EQUITY</span>
                <div id="notification-area">
                    <div id="notification-bell">🔔</div>
                    <span id="notification-badge" class="hidden">0</span>
                </div>
            </h4>
            <div id="live-equity-value" class="value">$0.00</div>
            <div class="sub-value">Daily P/L: <span id="daily-pl-numbers">$0.00 (0.00%)</span></div>
            <div class="progress-bar-container" style="margin-top: 8px; height: 4px;">
                <div id="pl-to-target-bar" class="progress-bar bg-blue"></div>
            </div>
            <div class="portfolio-info-bar">
                <span><strong id="portfolio-name-display">N/A</strong> (<strong id="mt5-account-display">N/A</strong>)</span>
                <div id="hud-status-indicator" class="status-indicator-hud">● Connecting...</div>
            </div>
        </div>
        <div class="card hud-card" id="daily-risk-card">
            <div class="card-header">
                <h4>DAILY RISK</h4>
                <select class="risk-dial" id="risk-dial">
                    <option value="0.01">1%</option>
                    <option value="0.02" selected>2%</option>
                    <option value="0.03">3%</option>
                    <option value="0.04">4%</option>
                    <option value="0.045">4.5%</option>
                </select>
            </div>
            <div class="value" id="risk-left-value">$0.00</div>
            <div class="sub-value">Risk Left</div>
            <div class="progress-bar-container" style="margin-top: 6px;">
                <div id="risk-progress-bar" class="progress-bar bg-gradient-risk"></div>
            </div>
            <div class="progress-footer">
                <span id="risk-used-display">Used: $0.00</span>
                <span id="risk-available-text">Available: $0.00</span>
            </div>
        </div>
        <div class="card hud-card" id="session-pl-card">
            <h4 class="card-header">SESSION P/L</h4>
            <div id="session-pl-value" class="value">$0.00</div>
            <div class="sub-value" id="pl-target-value">/ Target: $0.00</div>
            <div class="progress-bar-container" style="margin-top: 6px;">
                <div id="session-pl-progress-bar" class="progress-bar bg-blue"></div>
            </div>
            <div class="progress-footer">
                <span id="opening-balance-display">Balance: $0.00</span>
                <span id="session-pl-percent">0.00%</span>
            </div>
        </div>
    </template>
    <template id="battle-planner-template">
        <div id="battle-planner-expander" class="card expander-panel">
            <div class="card-header"><h3>BATTLE PLANNER</h3></div>
            <div class="side-panel-content">
                <div class="order-type-tabs">
                    <button class="tab-btn active" data-value="LIMIT">Limit</button>
                    <button class="tab-btn" data-value="MARKET">Market</button>
                    <button class="tab-btn" data-value="STOP">Stop</button>
                </div>
                <div class="planner-inputs" style="display: flex; flex-direction: column; gap: 12px;">
                    <div style="display: flex; gap: 12px; align-items: flex-end;">
                        <div class="planner-group" style="flex: 2 1 0%;"><label>Symbol</label><select id="symbol-select" class="planner-select"><option></option></select></div>
                        <div class="planner-group" style="flex: 1.5 1 0%;"><label>Lot Size</label><input type="number" id="lot-size-input" class="planner-input" value="0.00" step="0.01"></div>
                        <div class="planner-group hidden" id="entry-price-group" style="flex: 2 1 0%;"><label>Entry Price</label><input type="number" id="entry-price" class="planner-input" step="0.01"></div>
                    </div>
                    <div class="planner-group"><label for="tpsl-checkbox" style="cursor: pointer; padding: 4px 0;"><input type="checkbox" id="tpsl-checkbox" checked> Use TP / SL</label></div>
                    <div class="tpsl-group" style="display: flex; gap: 12px; align-items: flex-end;">
                        <div class="planner-group" style="flex: 2.5 1 0%;"><label>Take Profit</label><input type="number" id="take-profit" class="planner-input" step="0.01"></div>
                        <div class="planner-group" style="flex: 2.5 1 0%;"><label>Stop Loss</label><input type="number" id="stop-loss" class="planner-input" step="0.01"></div>
                        <div class="planner-group" style="flex: 1 1 0%;"><button class="btn-planner" id="calculate-btn" style="width: 100%; height: 38px; font-size: 0.8rem; padding: 0 4px;">CALCULATE</button></div>
                    </div>
                </div>
                <div id="rpt-display-area" class="planner-readouts" style="margin-top: 16px; padding-top: 12px; gap: 4px; border-top: 1px solid var(--color-border);">
                    <div class="readout-item">
                        <span>RPT Limit (1% Open Risk):</span>
                        <span id="rpt-limit-value">$0.00</span>
                    </div>
                    <div class="readout-item">
                        <span>RPT Available for New Trade:</span>
                        <span id="rpt-available-value" class="text-profit">$0.00</span>
                    </div>
                </div>
                <div class="execution-controls" style="margin-top: 16px; display: flex; gap: 10px;">
                    <button class="btn-planner" id="arm-btn" style="flex-grow: 1;" disabled>ARM</button>
                    <button class="btn-planner" id="execute-btn" style="flex-grow: 1;" disabled>EXECUTE</button>
                </div>
                <div class="planner-readouts">
                    <div class="readout-item"><span>Potential Loss:</span><div><span id="potential-loss-value">-$0.00</span><span id="potential-loss-percent" class="loss-percent"></span></div></div>
                    <div class="readout-item"><span>Potential Profit:</span><span id="potential-profit-value" class="text-profit">+$0.00</span></div>
                    <div class="readout-item"><span>R/R Ratio:</span><span id="rr-ratio-value">-</span></div>
                </div>
                <select id="order-type-hidden" class="planner-select" style="display: none;"><option value="MARKET_BUY">MARKET_BUY</option><option value="MARKET_SELL">MARKET_SELL</option><option value="BUY_LIMIT" selected>BUY_LIMIT</option><option value="SELL_LIMIT">SELL_LIMIT</option><option value="BUY_STOP">BUY_STOP</option><option value="SELL_STOP">SELL_STOP</option></select>
            </div>
        </div>
    </template>
    <template id="analysis-template">
        <div id="athena-expander" class="card expander-panel">
            <div class="card-header"><h3>ATHENA'S CORNER</h3></div>
            <div class="side-panel-content">
                
                <!-- Tab Controls -->
                <div class="athena-tabs">
                    <button class="athena-tab-btn active" data-target="mission-planner-pane">Mission Planner</button>
                    <button class="athena-tab-btn" data-target="analysis-pane">Analysis</button>
                </div>

                <!-- Content Panes -->
                <div class="athena-content">
                    
                    <!-- Mission Planner Pane -->
                    <div id="mission-planner-pane" class="athena-content-pane active">
                        <!-- THE ONLY CHANGE IS HERE: ADDING THE ID TO THIS WRAPPER DIV -->
                        <div id="foundation-form-wrapper">
                            <div class="planner-group">
                                <label>Evaluation Balance ($)</label>
                                <input type="number" id="mp-balance" class="planner-input" value="25000">
                            </div>
                            <div class="planner-group">
                                <label>Profit Target (%)</label>
                                <input type="number" id="mp-profit-target" class="planner-input" value="8">
                            </div>
                            <div class="planner-group">
                                <label>Consistency Rule (%)</label>
                                <input type="number" id="mp-consistency-rule" class="planner-input" value="30">
                            </div>
                            <div class="planner-group">
                                <label>Assumed R:R Ratio</label>
                                <select id="mp-rr-ratio" class="planner-select">
                                    <option value="1.5">1 : 1.5</option>
                                    <option value="2" selected>1 : 2</option>
                                    <option value="3">1 : 3</option>
                                </select>
                            </div>
                            <div style="display: flex; gap: 12px;">
                                <div class="planner-group">
                                    <label>Current Wins</label>
                                    <input type="number" id="mp-wins" class="planner-input" value="0">
                                </div>
                                <div class="planner-group">
                                    <label>Current Losses</label>
                                    <input type="number" id="mp-losses" class="planner-input" value="0">
                                </div>
                            </div>
                            <button class="btn-planner" id="mp-calculate-btn" style="margin-top: 16px;">Calculate Mission Plan</button>
                            
                            <!-- Results Area (Hidden by default) -->
                            <div id="mp-results" class="mission-results" style="display: none;">
                                <div class="result-item">
                                    <span class="result-label">Optimal Risk / Trade:</span>
                                    <span class="result-value text-loss" id="result-risk-usd">$0.00</span>
                                </div>
                                <div class="result-item">
                                    <span class="result-label">Optimal Profit / Trade:</span>
                                    <span class="result-value text-profit" id="result-profit-usd">$0.00</span>
                                </div>
                                <hr style="border-color: var(--color-border); margin: 8px 0;">
                                <div class="result-item">
                                    <span class="result-label">Progress to Target:</span>
                                    <span class="result-value" id="result-progress">0%</span>
                                </div>
                                <div class="result-item">
                                    <span class="result-label">Wins Needed to Pass:</span>
                                    <span class="result-value" id="result-wins-needed">0</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Analysis Pane (Placeholder) -->
                    <div id="analysis-pane" class="athena-content-pane">
                        <p>Multi-Timeframe Analysis content goes here...</p>
                    </div>

                </div>
            </div>
        </div>
    </template>
    <template id="bottom-bar-template">
        <div id="bottom-bar-header-tabs">
            <!-- Group 1: Situational Awareness (ปุ่มเดิมของท่าน ถูกรักษาไว้อย่างสมบูรณ์) -->
            <button class="bottom-header-btn" data-target="active-orders-section">ACTIVE ORDERS</button>
            <button class="bottom-header-btn" data-target="trade-history-section">TRADE HISTORY</button>
            
            <!-- [NEW] Group 2: Command Center Trigger (ปุ่มใหม่ที่เพิ่มเข้ามา) -->
            <button id="launch-portfolio-command-btn" class="bottom-header-btn" style="margin-left: 20px;">
                💼 PORTFOLIO COMMAND
            </button>
        </div>
        <div id="situational-awareness-card">
            <div id="active-orders-section" class="expander-section">
                <div class="expander-content">
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Time</th><th>Symbol</th><th>Type</th><th>Volume</th><th>Price</th><th>SL</th><th>TP</th><th>Risk $</th><th>R/R</th><th>Profit</th><th>Action</th></tr></thead>
                            <tbody id="open-positions-tbody"></tbody>
                            <tfoot>
                                <tr>
                                    <td colspan="7" style="text-align: right;"><strong>TOTAL</strong></td>
                                    <td id="total-open-risk" class="text-loss">$0.00 (0.00%)</td>
                                    <td id="total-open-rr">0.00</td>
                                    <td id="total-open-profit">$0.00</td>
                                    <td></td>
                                </tr>
                            </tfoot>
                        </table>
                        <h4 class="table-header-pending">PENDING ORDERS</h4>
                        <table>
                            <thead><tr><th>Time</th><th>Symbol</th><th>Type</th><th>Volume</th><th>Price</th><th>SL</th><th>TP</th><th>Risk $</th><th>Action</th></tr></thead>
                            <tfoot>
                                <tr>
                                    <td colspan="7" style="text-align: right;"><strong>TOTAL PENDING RISK</strong></td>
                                    <td id="total-pending-risk" class="text-loss">$0.00</td>
                                    <td></td>
                                </tr>
                            </tfoot>
                            <tbody id="pending-orders-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>            
            <div id="trade-history-section" class="expander-section">
                <div class="expander-content">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Close Time</th>
                                    <th>Symbol</th>
                                    <th>Type</th>
                                    <th>Volume</th>
                                    <th>Gross P/L</th>
                                    <th>Costs</th>
                                    <th>Net P/L</th>
                                </tr>
                            </thead>
                            <tbody id="trade-history-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </template>
    
    <!-- ====================================================== -->
    <!-- [NEW MODULE] Portfolio Command Center Template       -->
    <!-- ====================================================== -->
    <template id="portfolio-command-center-template">
        <div id="pcc-modal-overlay" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>💼 Portfolio Command Center</h3>
                    <button id="pcc-close-btn" class="modal-close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <!-- Tab Controls -->
                    <div class="pcc-tabs">
                        <button class="pcc-tab-btn active" data-target="pcc-manage-pane">Manage Portfolios</button>
                        <button class="pcc-tab-btn" data-target="pcc-upload-pane">Upload Statement</button>
                    </div>

                    <!-- Content Panes -->
                    <div class="pcc-content">
                        <!-- Pane 1: Manage Portfolios -->
                        <div id="pcc-manage-pane" class="pcc-content-pane active">
                            <h4>Manage Your Fleet</h4>
                            <!-- Content for 'Manage Portfolios' tab goes here -->
                            <p>Portfolio list and edit forms will be rendered here.</p>
                        </div>

                        <!-- Pane 2: Upload Statement -->
                        <div id="pcc-upload-pane" class="pcc-content-pane">
                            <h4>Data Ingestion Dock</h4>
                            <!-- Content for 'Upload Statement' tab goes here -->
                            <p>Statement uploader will be rendered here.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

</body>
</html>
